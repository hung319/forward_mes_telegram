name: CI & Push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: "requirements.txt"
    
    - name: Set up Python
      run: uv python install 3.11
    
    - name: Install dependencies
      run: |
        uv pip install --system -r requirements.txt
        uv pip install --system flake8 black isort
    
    - name: Check code style with Black
      run: |
        black --check --diff . || true
    
    - name: Check imports with isort
      run: |
        isort --check-only --diff . || true
    
    - name: Lint with flake8
      run: |
        flake8 . --max-line-length=120 --ignore=E501,W503 || true
    
    - name: Check Python syntax
      run: |
        python -m py_compile bot.py config.py web.py filters.py logger.py sync.py menu.py
        echo "✅ Syntax check passed"

  push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Configure Git
      run: |
        git config user.name "${{ github.actor }}"
        git config user.email "${{ github.actor }}@users.noreply.github.com"
    
    - name: Check for changes
      id: changed-files
      uses: tj-actions/changed-files@v44
      with:
        files: |
          *.py
    
    - name: Commit and push if changes exist
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        git add -A
        git commit -m "chore: Code quality checks passed" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}